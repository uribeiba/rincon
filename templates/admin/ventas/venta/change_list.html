{% extends "admin/change_list.html" %}

{% block content_title %}

<h1>Ventas Diarias</h1>

<div style="
    background:#fff;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #ddd;
">

    <h2>Resumen</h2>

    <table style="width:100%; font-size:16px;">

        <tr>
            <td><strong>Efectivo:</strong></td>
            <td>{{ totales.efectivo }}</td>

            <td><strong>Débito:</strong></td>
            <td>{{ totales.debito }}</td>
        </tr>

        <tr>
            <td><strong>Transferencia:</strong></td>
            <td>{{ totales.transferencia }}</td>

            <td><strong>Crédito:</strong></td>
            <td>{{ totales.credito }}</td>
        </tr>

        <tr>
            <td><strong>TOTAL:</strong></td>
            <td colspan="3">
                <strong style="color:green;font-size:24px">
                    {{ totales.total }}
                </strong>
            </td>
        </tr>

    </table>

</div>

{% endblock %}
